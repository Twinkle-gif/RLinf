defaults:
  - env/maniskill_screw_trinut@env.train
  - env/maniskill_screw_trinut@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env,rollout,actor: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_ppo_mlp_screw"
    logger_backends: ["tensorboard"]

  max_epochs: 4000
  max_steps: -1

  only_eval: False
  val_check_interval: 50
  save_interval: 250

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 4
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"

  bootstrap_type: standard
  kl_beta: 0.0
  entropy_bonus: 0.005
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.5
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 16  # action_dim for Allegro
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1024
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 200
    ignore_terminations: True
    group_size: 1
  eval:
    total_num_envs: 16
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 200
    use_fixed_reset_state_ids: True
    group_size: 1
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ""
    precision: ${actor.model.precision}

  enable_torch_compile: True
  enable_cuda_graph: True

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 256
  global_batch_size: 1024
  seed: 1234
  enable_offload: False

  # Override defaults from model/mlp_policy
  model:
    model_type: "mlp_policy"
    # obs_dim layout (state obs = agent proprioception + task extra):
    #   agent: qpos(16) + qvel(16) + palm_pose(7) + tip_poses(28) + fsr_impulse(16) = 83
    # + extra: screw_root_pose(7) + nut_pose(7) + nut_qpos(1) + nut_qvel(1) + cum_rotation(1) = 17
    # ----------------------------------------------- total = 100
    obs_dim: 100
    action_dim: 16
    hidden_dim: 512
    # Use a plain MLP critic (not the object-set critic used by DistributeObject).
    critic_type: "mlp"
    model_path: ""

  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    critic_warmup_steps: 0
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.0
    clip_grad: 0.5

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False