model_type: "mlp_policy"

model_path: ""

policy_setup: "panda-qpos"
obs_dim: 41 # Actor obs dim for asymmetric policy (same as MoveObject): agent_state + tcp_pose(7) + obj_pose(7) + goal_pos(3) + tcp_to_obj(3) + obj_to_goal(3)
critic_obs_dim: null # Auto-computed when critic_type="object_set". Otherwise set manually.
action_dim: 8
num_action_chunks: 1
hidden_dim: 512

precision: "32"
add_value_head: True

is_lora: False
lora_rank: 32

# --- Critic configuration ---
# critic_type: "mlp" (default, flat ValueHead) or "object_set" (ObjectSetCritic with per-object encoding + pooling)
critic_type: "mlp"
# ObjectSetCritic params (only used when critic_type="object_set"):
critic_global_dim: null    # e.g. agent_dim + 7(tcp_pose) + 1(num_placed) + 1(is_grasping)
critic_per_obj_dim: null   # e.g. 3(obj_pos) + 3(assigned_goal_pos) + 1(obj_at_goal) + 1(obj_to_goal_dist) = 8
critic_num_objects: null   # e.g. 1 for DistributeObject-v1, 2 for v2, etc.
critic_obj_encoder_hidden: null  # e.g. [64, 64]
critic_final_hidden: null        # e.g. [256, 256]
critic_pool_mode: "mean"         # "mean", "sum", or "max"