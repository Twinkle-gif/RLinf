env_type: maniskill

total_num_envs: null

wrap_obs_mode: simple
use_full_state: False
auto_reset: False
ignore_terminations: False
use_rel_reward: False
# Potential-based reward shaping (Ng, Harada, Russell 1999):
#   r'_t = gamma * Phi(s_{t+1}) - Phi(s_t)
# gamma is taken from the PPO discount factor (algorithm.gamma) to keep the
# shaping policy-invariant; the magnitude rescale 1/(1-gamma) is derived
# from the same gamma inside the env wrapper, no extra config knobs needed.
gamma: ${algorithm.gamma}
reward_mode: raw
seed: 0
group_size: 1
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 500
max_episode_steps: 500 # max episode steps for truncation

video_cfg:
  save_video: False
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False

init_params:
  id: "DistributeObject-v1"
  num_envs: null # will be set in ManiSkillEnv init
  obs_mode: "state"
  control_mode: None
  sim_backend: "gpu"
  sim_config:
    sim_freq: 100
    control_freq: 20
  max_episode_steps: ${env.train.max_episode_steps} # max episode steps for truncation
  sensor_configs:
    shader_pack: "default"
  render_mode: all
